name: Deploy PacPac to Web

on:
  push:
    branches:
      - master

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install love.js Globally
        run: npm install -g love.js

      - name: Create .love Package
        # Safely normalizes file naming conventions and zips asset types only
        run: |
          cp pacpac.lua main.lua
          cp pacpac_conf.lua conf.lua
          zip game.love *.lua *.wav *.ttf *.txt

      - name: Compile to HTML5 WebAssembly
        # Compiles using your working single-threaded compatibility configuration
        run: love.js -c game.love dist --title "Sakwo's PacPac Web Game" --memory 33554432

      - name: Setup GitHub Pages Environment
        uses: actions/configure-pages@v4

      - name: Upload Build Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
