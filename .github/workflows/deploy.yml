name: Deploy PacPac to Web

on:
  push:
    branches:
      - master # Explicitly targets your active branch

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install love.js Globally
        run: npm install -g love.js

      - name: Create .love Package
        # Dynamically checks for file locations to guarantee matching paths before building the archive
        run: |
          if [ -f "pacpac.lua" ]; then
            cp pacpac.lua main.lua
            cp pacpac_conf.lua conf.lua
          elif [ -f "src/pacpac.lua" ]; then
            cp src/pacpac.lua ./main.lua
            cp src/pacpac_conf.lua ./conf.lua
            cp -r src/* .
          fi
          zip -r game.love . -x ".*" ".github/*" "game.love" "dist/*" "src/*"

      - name: Compile to HTML5 WebAssembly
        # Compiles using the compatibility flag
        run: love.js -c game.love dist --title "Sakwo's PacPac Web Game" --memory 33554432

      - name: Setup GitHub Pages Environment
        uses: actions/configure-pages@v4

      - name: Upload Build Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
