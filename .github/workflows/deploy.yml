name: Deploy PacPac to Web

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install love.js Globally
        run: npm install -g love.js

      - name: Create .love Package
        run: |
          rm -f game.love
          cd pacpac
          zip -9 -r ../game.love .

      - name: Compile to HTML5 WebAssembly
        run: |
          rm -rf dist
          love.js -c game.love dist --title "Sakwo's PacPac Web Game" --memory 33554432

      - name: Setup GitHub Pages Environment
        uses: actions/configure-pages@v4

      - name: Upload Build Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
